<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage User</title>
    <link rel="stylesheet" href="usersForm.scss" />
    <script type="module" src="usersForm.ts"></script>
  </head>
  <body>
    <nav class="navbar">
      <h1 class="title">Social Network</h1>
      <ul class="nav-links">
        <li><a href="../../index.html">Home</a></li>
        <li><a href="../users/users.html">Users</a></li>
        <li><a href="../groups/groups.html">Groups</a></li>
      </ul>
    </nav>

    <div class="container">
      <h2 id="addTitle" class="form-title">Add new user</h2>
      <h2 id="editTitle" class="form-title">Edit user</h2>

      <form id="userForm" class="form-group">
        <input type="hidden" id="userId" />

        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username..."
          required
        />
        <span id="usernameError" class="input-error"></span>

        <label for="firstName">First Name:</label>
        <input
          type="text"
          id="firstName"
          name="firstName"
          placeholder="Enter first name..."
          required
        />
        <span id="firstNameError" class="input-error"></span>

        <label for="lastName">Last Name:</label>
        <input
          type="text"
          id="lastName"
          name="lastName"
          placeholder="Enter last name..."
          required
        />
        <span id="lastNameError" class="input-error"></span>

        <label for="dateOfBirth">Date of Birth:</label>
        <input type="date" id="dateOfBirth" name="dateOfBirth" required />
        <span id="dateOfBirthError" class="input-error"></span>

        <div class="form-actions">
          <button type="button" id="saveUserBtn" class="btn btn-primary">
            Save User
          </button>
          <button type="button" id="cancelBtn" class="btn btn-secondary">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
